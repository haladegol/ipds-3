{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block auth_content %}
<div class="auth-bg">
    <div class="grid-overlay"></div>
    <canvas id="particleCanvas"></canvas>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-ring">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="url(#authGrad)" stroke-width="2"/>
                    <path d="M16 24L22 30L34 18" stroke="url(#authGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="authGrad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#408A71"/><stop offset="1" stop-color="#B0E4CC"/></linearGradient></defs>
                </svg>
            </div>
            <h1>HADES <span class="accent">IDS</span></h1>
            <p>3-Stage Intrusion Detection and Prevention System</p>
        </div>

        <form method="POST" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">
                <span>Sign In</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Create Account</a></p>
        </div>
    </div>
</div>

<style>
    #particleCanvas {
        position: absolute; top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1; pointer-events: none;
    }
    .auth-card { z-index: 10; }
</style>

<script>
// Interactive floating particles
const canvas = document.getElementById('particleCanvas');
if (canvas) {
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const count = 50;

    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.5,
            dx: (Math.random() - 0.5) * 0.5,
            dy: (Math.random() - 0.5) * 0.5,
            opacity: Math.random() * 0.5 + 0.1,
        });
    }

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach((p, i) => {
            // Mouse repulsion
            const distX = p.x - mouseX;
            const distY = p.y - mouseY;
            const dist = Math.sqrt(distX * distX + distY * distY);
            if (dist < 120) {
                p.x += distX * 0.02;
                p.y += distY * 0.02;
            }

            p.x += p.dx;
            p.y += p.dy;

            if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(176, 228, 204, ${p.opacity})`;
            ctx.fill();

            // Draw connections
            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const d = Math.sqrt((p.x - p2.x) ** 2 + (p.y - p2.y) ** 2);
                if (d < 150) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(64, 138, 113, ${0.12 * (1 - d / 150)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        });

        requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
}
</script>
{% endblock %}
